<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daedalus Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css"></head><body>
<main class="app"><aside class="panel">
<h1>Daedalus Studio</h1>
<label>Plantilla</label><select id="templateSelect"></select>
<label>Cuerpo</label><textarea id="bodyInput"></textarea>
<label>Firma</label><input id="signatureInput" type="text">
<label>Fecha</label><input id="dateInput" type="text">
<div class="actions"><button id="renderBtn">Actualizar</button><button id="downloadPngBtn" class="secondary">Generar PNG</button><button id="downloadHtmlBtn" class="tertiary">Descargar HTML</button></div>
<p class="hint">Usa *texto* para negrita. Usa - o • para viñetas, 1. para listas numeradas, > para sangría y >> para doble sangría.</p>
</aside>
<section class="stage"><div class="artboard-wrap"><div id="artboard" class="artboard">
<div id="templateLayer" class="template-layer"></div><div id="extensionLayer" class="extension-layer"></div><div id="barExtension" class="bar-extension"></div>
<div id="textLayer" class="text-layer"><div id="bodyText"></div><div id="signatureText"></div><div id="dateText"></div></div>
</div></div></section></main>

<div id="exportModal" class="export-modal" hidden>
  <div class="export-modal-card">
    <div class="export-modal-head">
      <strong>Imagen generada</strong>
      <button id="closeExportModal" class="modal-close" type="button">Cerrar</button>
    </div>
    <p class="export-help">En iPhone: mantén presionada la imagen y elige “Guardar en Fotos”, o usa “Compartir”.</p>
    <div class="export-actions">
      <button id="shareImageBtn" type="button">Compartir</button>
      <button id="downloadImageBtn" type="button" class="secondary">Descargar</button>
      <button id="openImageBtn" type="button" class="tertiary">Abrir imagen</button>
    </div>
    <div id="exportImageWrap" class="export-image-wrap"></div>
  </div>
</div>

<script src="js/templateStore.js"></script><script src="js/parser.js"></script><script src="js/engine.js"></script><script src="js/exporter.js"></script><script src="js/app.js"></script>
</body></html>
